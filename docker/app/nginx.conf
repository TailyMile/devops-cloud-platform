events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {

    listen 80;

    location / {
      root /usr/share/nginx/html;
      index index.html;
    }

    location = /grafana {
      return 301 /grafana/;
    }

    location /grafana/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /grafana;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80;
    }

    location = /prometheus {
      return 301 /prometheus/;
    }

    location /prometheus/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /prometheus;
      proxy_pass http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090;
    }

    location = /alertmanager {
      return 301 /alertmanager/;
    }

    location /alertmanager/ {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /alertmanager;
      proxy_pass http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093;
    }

  }

}
