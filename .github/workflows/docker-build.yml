name: build-and-push-image

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'docker/app/**'
      - '.github/workflows/docker-build.yml'

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository name to lowercase
        id: repo
        run: |
          echo "repo=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ steps.repo.outputs.repo }}/nginx:latest -t ghcr.io/${{ steps.repo.outputs.repo }}/nginx:${{ github.sha }} ./docker/app

      - name: Push image
        run: |
          docker push ghcr.io/${{ steps.repo.outputs.repo }}/nginx:latest
          docker push ghcr.io/${{ steps.repo.outputs.repo }}/nginx:${{ github.sha }}