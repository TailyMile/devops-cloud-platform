name: build-and-push-image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/app/**'
      - '.github/workflows/docker-build.yml'

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/nginx:1.0 ./docker/app

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}/nginx:1.0