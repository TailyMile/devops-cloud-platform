grafana:
  adminPassword: admin

  service:
    type: ClusterIP

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      jsonData:
        maxLines: 1000

prometheus:
  service:
    type: ClusterIP

  prometheusSpec:
    retention: 7d

alertmanager:
  service:
    type: ClusterIP

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
