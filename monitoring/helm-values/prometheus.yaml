grafana:
  adminPassword: admin

  service:
    type: ClusterIP

  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      jsonData:
        maxLines: 1000

prometheus:
  service:
    type: ClusterIP

  prometheusSpec:
    retention: 7d
    routePrefix: /prometheus

alertmanager:
  service:
    type: ClusterIP

  alertmanagerSpec:
    routePrefix: /alertmanager
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
